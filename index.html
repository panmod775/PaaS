<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ giới thiệu ✦</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0b0e14;
            background-image: 
                linear-gradient(rgba(18, 52, 114, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 52, 114, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* hiệu ứng mưa code matrix nhẹ */
        .matrix-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        .matrix-rain span {
            position: absolute;
            color: #0ff;
            font-family: 'Rajdhani', monospace;
            font-size: 18px;
            animation: rain 8s linear infinite;
            white-space: nowrap;
        }

        @keyframes rain {
            0% { transform: translateY(-100%); opacity: 1; }
            100% { transform: translateY(1000%); opacity: 0; }
        }

        /* main card - phong cách nam tính */
        .profile-card {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            width: 100%;
            background: rgba(8, 12, 25, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #2a3f5e;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 30px #1e90ff40;
            padding: 2.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        /* cột avatar */
        .profile-left {
            flex: 1 1 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        .avatar-frame {
            width: 220px;
            height: 220px;
            border-radius: 30px;
            background: linear-gradient(145deg, #1e2f4a, #0a121f);
            padding: 5px;
            box-shadow: 0 15px 30px #00000080, 0 0 20px #0077ff;
            transform: rotate(2deg);
            transition: 0.3s;
        }

        .avatar-frame:hover {
            transform: rotate(0deg) scale(1.02);
            box-shadow: 0 20px 40px #0044ff, 0 0 40px #00a6ff;
        }

        .avatar-icon {
            width: 100%;
            height: 100%;
            border-radius: 26px;
            background: #111c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 6rem;
            color: #7fb7ff;
            border: 2px solid #2f6eb0;
            text-shadow: 0 0 30px #0077ff;
        }

        /* social links - mạnh mẽ */
        .social-links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-links a {
            text-decoration: none;
            color: #b0d4ff;
            background: #162433;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 1px solid #2f5a9c;
            transition: 0.2s;
            box-shadow: 0 8px 0 #0a121f;
        }

        .social-links a:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 0 #0a121f, 0 0 25px #0099ff;
            background: #1e3b5e;
            color: white;
            border-color: #6cb3ff;
        }

        /* cột phải */
        .profile-right {
            flex: 2 1 500px;
            color: #e2ecff;
        }

        .name-tag {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #1e3d66;
            padding-bottom: 1rem;
        }

        .name-tag h1 {
            font-size: 3.2rem;
            font-weight: 800;
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #9fc5ff, #4d9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #0044ff;
        }

        .badge {
            background: #1f3a5f;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            color: #c6e2ff;
            border: 1px solid #4d8cff;
            box-shadow: 0 0 15px #2855b7;
            letter-spacing: 1px;
        }

        .quote {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 1.5rem 0 2rem;
            padding: 1rem 1.8rem;
            background: rgba(0, 30, 70, 0.5);
            border-left: 6px solid #2f6eb0;
            border-radius: 0 20px 20px 0;
            font-style: italic;
            border-right: 2px solid #2f6eb0;
            box-shadow: 0 0 30px #002b66;
        }

        /* info grid - nam tính */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1.3rem;
            margin: 2.5rem 0;
        }

        .info-item {
            background: #0b1727;
            border: 1px solid #27496e;
            border-radius: 22px;
            padding: 1.2rem 1rem;
            transition: 0.25s;
            box-shadow: 0 8px 0 #020812;
        }

        .info-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 0 #020812, 0 0 30px #1e90ff;
            border-color: #3a8cff;
            background: #10253b;
        }

        .info-item i {
            font-size: 2.2rem;
            color: #5fa3ff;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px #006eff);
        }

        .info-item h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #b5d6ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
        }

        .info-item p {
            font-size: 1rem;
            font-weight: 500;
            color: #9bb9e0;
        }

        /* hobby tags - mạnh mẽ */
        .hobbies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            margin: 2rem 0 1.5rem;
        }

        .hobby-tag {
            background: #0f1d30;
            border: 1.5px solid #2d68b0;
            border-radius: 12px;
            padding: 0.5rem 1.4rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: #c5deff;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #07101c;
            transition: 0.15s;
        }

        .hobby-tag i {
            margin-right: 8px;
            color: #5fadff;
        }

        .hobby-tag:hover {
            background: #1f3f68;
            border-color: #89c2ff;
            transform: scale(1.05);
            box-shadow: 0 6px 0 #07101c, 0 0 20px #0077ff;
        }

        /* nút action */
        .action-button {
            background: transparent;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            background: #0e1d30;
            padding: 0.9rem 2.5rem;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #c1ddff;
            border: 2px solid #2b68b5;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #040b14;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
        }

        .action-button:hover {
            background: #1e3f68;
            color: white;
            border-color: #7fbfff;
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #040b14, 0 0 30px #0088ff;
        }

        /* energy bar - thêm nam tính */
        .energy-bar {
            width: 100%;
            height: 12px;
            background: #111f2f;
            border-radius: 20px;
            margin: 1.5rem 0 0.5rem;
            border: 1px solid #24496e;
            overflow: hidden;
        }

        .energy-fill {
            width: 88%;
            height: 100%;
            background: linear-gradient(90deg, #1e62b0, #3fa0ff);
            border-radius: 20px;
            box-shadow: 0 0 20px #0077ff;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .energy-text {
            display: flex;
            justify-content: space-between;
            color: #8ab3ff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* responsive */
        @media (max-width: 700px) {
            .profile-card {
                padding: 1.5rem;
            }
            .name-tag h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- hiệu ứng matrix rain nhẹ -->
    <div class="matrix-rain" id="matrixRain"></div>

    <!-- card chính -->
    <div class="profile-card">
        <!-- cột trái -->
        <div class="profile-left">
            <div class="avatar-frame">
                <div class="avatar-icon">
                    <i class="fas fa-user-ninja"></i> <!-- icon ninja chất -->
                </div>
                <!-- nếu muốn dùng ảnh thật: thay bằng img -->
            </div>
            <div class="social-links">
                <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank"><i class="fab fa-discord"></i></a>
                <a href="#" target="_blank"><i class="fab fa-steam"></i></a>
                <a href="#" target="_blank"><i class="fab fa-twitch"></i></a>
                <a href="#" target="_blank"><i class="fab fa-xbox"></i></a>
            </div>

            <!-- energy bar thể hiện phong cách game -->
            <div style="width: 100%; margin-top: 0.5rem;">
                <div class="energy-text">
                    <span><i class="fas fa-bolt"></i> POWER LEVEL</span>
                    <span>88%</span>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill"></div>
                </div>
            </div>
        </div>

        <!-- cột phải -->
        <div class="profile-right">
            <div class="name-tag">
                <h1>Sang</h1>
                <span class="badge"><i class="fas fa-skull"></i>  PAN-756  <i class="fas fa-code"></i></span>
            </div>

            <div class="quote">
                <i class="fas fa-quote-right" style="margin-right: 8px;"></i> 
                "Code. Game. Vươn tới hạng S. Không bao giờ bỏ cuộc."
            </div>

            <!-- grid thông tin cá nhân -->
            <div class="info-grid">
                <div class="info-item">
                    <i class="fas fa-cake-candles"></i>
                    <h3>Tuổi</h3>
                    <p>20 · 07/05</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-location-dot"></i>
                    <h3>Xuất thân</h3>
                    <p>Seoul · Gangnam</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-laptop-code"></i>
                    <h3>Dev / Game</h3>
                    <p>Unity · C++ · Python</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-trophy"></i>
                    <h3>Rank hiện tại</h3>
                    <p>Diamond II (VALORANT)</p>
                </div>
            </div>

            <!-- hobby tags nam tính -->
            <div class="hobbies">
                <span class="hobby-tag"><i class="fas fa-gamepad"></i> FPS</span>
                <span class="hobby-tag"><i class="fas fa-lock-open"></i> Crack</span>
                <span class="hobby-tag"><i class="fas fa-headphones"></i> EDM / Phonk</span>
                <span class="hobby-tag"><i class="fas fa-motorcycle"></i> Môtô</span>
                <span class="hobby-tag"><i class="fas fa-robot"></i> AI</span>
                <span class="hobby-tag"><i class="fas fa-chess-queen"></i> Chiến thuật</span>
            </div>

            <!-- nút tương tác -->
            <button class="action-button" onclick="showMessage()">
                <i class="fas fa-paper-plane"></i>  liên hệ ngay
            </button>
        </div>
    </div>

    <script>
        // tạo hiệu ứng matrix rain (mưa chữ số)
        function createMatrixRain() {
            const container = document.getElementById('matrixRain');
            const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
            for (let i = 0; i < 70; i++) {
                const span = document.createElement('span');
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (Math.random() * 5 + 4) + 's';
                span.style.animationDelay = Math.random() * 8 + 's';
                span.style.fontSize = (Math.random() * 20 + 12) + 'px';
                span.style.color = `rgba(100, 200, 255, ${Math.random() * 0.4 + 0.1})`;
                
                // random chuỗi ký tự
                let str = '';
                for (let j = 0; j < 8; j++) {
                    str += chars[Math.floor(Math.random() * chars.length)];
                }
                span.innerText = str;
                container.appendChild(span);
            }
        }

        // thông báo nam tính
        function showMessage() {
            alert('⚡ Kết nối thành công! Sẵn sàng chiến đấu cùng cậu. ⚡');
        }

        window.onload = function() {
            createMatrixRain();
        };
    </script>
</body>
</html>
